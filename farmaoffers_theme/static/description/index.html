<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>Farmaoffers Theme</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial; color:#333; padding:24px; }
      .hero { display:flex; gap:16px; align-items:center; }
      img { width:64px; height:64px; object-fit:contain; }
      h1 { margin:0; font-size:20px; }
    </style>
  </head>
  <body>
    <div class="hero">
      <img src="/farmaoffers_theme/static/description/icon.png" alt="Farmaoffers logo"/>
      <div>
        <h1>Farmaoffers Theme</h1>
        <p>Custom website & frontend snippets for Farmaoffers.</p>
      </div>
    </div>
    <section>
      <h2>About</h2>
      <p>This module provides website templates, snippets and frontend assets used by the Farmaoffers site.</p>
    </section>
  </body>
</html>
